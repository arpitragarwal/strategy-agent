<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- cross links -->
  <line x1="28"  y1="43"  x2="90"  y2="28"  stroke="#222" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.2"/>
  <line x1="138" y1="52"  x2="145" y2="108" stroke="#222" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.2"/>
  <line x1="118" y1="158" x2="42"  y2="165" stroke="#222" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.2"/>
  <line x1="8"   y1="148" x2="2"   y2="88"  stroke="#222" stroke-width="0.8" stroke-dasharray="2 4" opacity="0.2"/>

  <!-- radial lines to centre 100,100 -->
  <line x1="28"  y1="43"  x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="90"  y1="28"  x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="138" y1="52"  x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="145" y1="108" x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="118" y1="158" x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="42"  y1="165" x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="8"   y1="148" x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>
  <line x1="2"   y1="88"  x2="100" y2="100" stroke="#222" stroke-width="1" stroke-dasharray="2 4" opacity="0.35"/>

  <!-- outer dots -->
  <circle cx="28"  cy="43"  r="5"   fill="#534AB7"/>
  <circle cx="90"  cy="28"  r="3.5" fill="#534AB7" opacity="0.75"/>
  <circle cx="138" cy="52"  r="5.5" fill="#534AB7"/>
  <circle cx="145" cy="108" r="4"   fill="#534AB7" opacity="0.8"/>
  <circle cx="118" cy="158" r="4.5" fill="#534AB7"/>
  <circle cx="42"  cy="165" r="3.5" fill="#534AB7" opacity="0.75"/>
  <circle cx="8"   cy="148" r="5.5" fill="#534AB7"/>
  <circle cx="2"   cy="88"  r="4"   fill="#534AB7" opacity="0.8"/>

  <!-- central insight node -->
  <circle cx="100" cy="100" r="20" fill="#AFA9EC" opacity="0.3"/>
  <circle cx="100" cy="100" r="13" fill="#534AB7"/>
  <circle cx="100" cy="100" r="5.5" fill="#EEEDFE"/>
</svg>
