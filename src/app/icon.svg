<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- cross links -->
  <line x1="28"  y1="43"  x2="90"  y2="28"  stroke="#111" stroke-width="2.5" stroke-dasharray="4 5"/>
  <line x1="138" y1="52"  x2="145" y2="108" stroke="#111" stroke-width="2.5" stroke-dasharray="4 5"/>
  <line x1="118" y1="158" x2="42"  y2="165" stroke="#111" stroke-width="2.5" stroke-dasharray="4 5"/>
  <line x1="8"   y1="148" x2="2"   y2="88"  stroke="#111" stroke-width="2.5" stroke-dasharray="4 5"/>

  <!-- radial lines to centre 100,100 -->
  <line x1="28"  y1="43"  x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="90"  y1="28"  x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="138" y1="52"  x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="145" y1="108" x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="118" y1="158" x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="42"  y1="165" x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="8"   y1="148" x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>
  <line x1="2"   y1="88"  x2="100" y2="100" stroke="#111" stroke-width="3.5" stroke-dasharray="4 5"/>

  <!-- outer dots -->
  <circle cx="28"  cy="43"  r="8"   fill="#111"/>
  <circle cx="90"  cy="28"  r="6"   fill="#111"/>
  <circle cx="138" cy="52"  r="8.5" fill="#111"/>
  <circle cx="145" cy="108" r="7"   fill="#111"/>
  <circle cx="118" cy="158" r="7.5" fill="#111"/>
  <circle cx="42"  cy="165" r="6"   fill="#111"/>
  <circle cx="8"   cy="148" r="8.5" fill="#111"/>
  <circle cx="2"   cy="88"  r="7"   fill="#111"/>

  <!-- central node — black ring with white hollow core -->
  <circle cx="100" cy="100" r="22" fill="#111"/>
  <circle cx="100" cy="100" r="9"  fill="#ffffff"/>
</svg>
